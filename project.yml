name: Reflo
options:
  bundleIdPrefix: com.reflo
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

packages:
  EPUBKit:
    url: https://github.com/witekbobrowski/EPUBKit.git
    from: "0.5.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete

targets:
  Reflo:
    type: application
    platform: iOS
    sources:
      - path: Reflo
      - path: prompts/questions.md
        buildPhase: resources
      - path: prompts/second-example-prompt.md
        buildPhase: resources
      - path: prompts/mending.md
        buildPhase: resources
      - path: prompts/narration-reply.md
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.reflo.app
        INFOPLIST_FILE: Reflo/Info.plist
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        DEVELOPMENT_TEAM: ""
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - package: EPUBKit
        product: EPUBKit
    info:
      path: Reflo/Info.plist
      properties:
        UILaunchScreen: {}
        CFBundleDisplayName: Reflo
        NSMicrophoneUsageDescription: "Reflo listens so you can explain what you learned out loud. Audio stays on your phone."
        NSSpeechRecognitionUsageDescription: "Reflo transcribes your spoken summary on your device to reflect your understanding back to you."
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIFileSharingEnabled: true
        LSSupportsOpeningDocumentsInPlace: true

  RefloTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: RefloTests
      - path: prompts/questions.md
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.reflo.app.tests
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: Reflo
      - package: EPUBKit
        product: EPUBKit

schemes:
  Reflo:
    build:
      targets:
        Reflo: all
        RefloTests: [test]
    test:
      targets:
        - RefloTests
